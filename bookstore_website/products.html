<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หนังสือทั้งหมด | WarmRead Store</title>
  <link rel="stylesheet" href="assets/common.css" />
  <link rel="stylesheet" href="products.css" />
</head>
<body data-page="products">
  <div id="appNav"></div>
  <main>
    <section class="section">
      <div class="container">
        <div class="section-title"><div><h2>หนังสือทั้งหมด</h2><p>ค้นหา กรองหมวดหมู่ และดูสต็อก</p></div></div>
        <div class="card toolbar">
          <input class="input" id="searchInput" placeholder="ค้นหาชื่อหนังสือ / ผู้แต่ง / หมวดหมู่">
          <select class="select" id="categorySelect"><option value="all">ทุกหมวดหมู่</option></select>
          <select class="select" id="stockSelect">
            <option value="all">ทุกสถานะ</option>
            <option value="ready">พร้อมขาย</option>
            <option value="low">ใกล้หมด</option>
          </select>
        </div>
        <div class="book-grid products-grid" id="productsGrid"></div>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-inner">
      <div><strong>WarmRead Store</strong><br><span>CSI204 Workshop #1</span></div>
      <div class="pill-row"><span class="badge">HTML</span><span class="badge">CSS</span><span class="badge">JavaScript</span><span class="badge orange">Local Storage</span></div>
    </div>
  </footer>
  <script src="assets/common.js"></script>
  <script src="products.js"></script>
</body>
</html>
